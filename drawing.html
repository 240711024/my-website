<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=320, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>
タッチした場所への描画
</title>
<link rel="stylesheet" href="./drawing.css">
</head>
<body onload="init()">
<canvas id="canvas" width="320" height="480"></canvas>
<script src="drawing.js" type="text/javascript">
</script>


太さ：
<input type="range" min="1" max="20" value="4" id="penSize" onchange="setSize()">
<span id="sizeValue">4</span>px<br>
<button id="circle">丸ペン</button><br>
<button id="square">四角ペン</button><br>
<button id="eraser">消しゴム</button><br>


<span class="redText">赤色成分：</span>
<input type="range" min="0" max="255" id="r" onchange="setRGB()"><br>

<span class="greenText">緑色成分：</span>
<input type="range" min="0" max="255" id="g" onchange="setRGB()"><br>

<span class="blueText">青色成分：</span>
<input type="range" min="0" max="255" id="b" onchange="setRGB()"><br>


現在の色：
<span id="hex">#000000　</span>

<div id="sample"></div>




</body>
</html>
